<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <script>
        (function () {
            const newBase = "https://mofi-wedding-invite.netlify.app";

            // Get full query string (?guest=...&prefix=...)
            const query = window.location.search;

            // Optional: preserve hash (#something)
            const hash = window.location.hash;

            // Redirect
            window.location.replace(newBase + query + hash);
        })();
    </script>

    <noscript>
        <meta http-equiv="refresh" content="0;url=https://mofi-wedding-invite.netlify.app/">
    </noscript>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>
